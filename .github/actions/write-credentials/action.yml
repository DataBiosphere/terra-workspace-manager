name: 'write-credentials'
description: 'Collect the needed credentials for testing'
inputs:
  target:
    description: 'Target environment: dev, staging or bee'
    default: 'dev'
    required: true

runs:
    using: "composite"
    steps:
      # we determine the repo secrets to use based on the supplied terra environment
      - id: setup-env-var-names
        name: 'Setup env var names'
        env:
          TERRA_ENV: ${{ inputs.terra-env }}
        run: |
          echo "USER_DELEGATED_SA_VAR=USER_DELEGATED_SA_${TERRA_ENV}" >> ${GITHUB_OUTPUT}
          echo "BUFFER_CLIENT_SA_VAR=BUFFER_CLIENT_SA_${TERRA_ENV}" >> ${GITHUB_OUTPUT}
          echo "TESTRUNNER_SA_VAR=TESTRUNNER_SA_${TERRA_ENV}" >> ${GITHUB_OUTPUT}
          echo "TESTRUNNER_K8S_SA_VAR=TESTRUNNER_K8S_SA_${TERRA_ENV}" >> ${GITHUB_OUTPUT}
          echo "WSM_SA_VAR=WSM_SA_${TERRA_ENV}" >> ${GITHUB_OUTPUT}
        shell: bash
      - name: Write credentials
        id: 'setup-user-delegated-creds'
        run: |
          mkdir -p config
          USER_DELEGATED_SA_B64=${{ secrets[steps.setup-env-var-names.outputs.USER_DELEGATED_SA_VAR] }}
          echo ::add-mask::$USER_DELEGATED_SA_B64
          USER_DELEGATED_SA=$(echo $USER_DELEGATED_SA_B64 | base64 --decode)
          echo ::add-mask::$USER_DELEGATED_SA
          echo $USER_DELEGATED_SA | jq .type
          echo $USER_DELEGATED_SA > config/user-delegated-sa.json

          BUFFER_CLIENT_SA_B64=${{ secrets[steps.setup-env-var-names.outputs.BUFFER_CLIENT_SA_VAR] }}
          echo ::add-mask::$BUFFER_CLIENT_SA_B64
          BUFFER_CLIENT_SA=$(echo $BUFFER_CLIENT_SA_B64 | base64 --decode)
          echo ::add-mask::$BUFFER_CLIENT_SA
          echo $BUFFER_CLIENT_SA | jq .type
          echo $BUFFER_CLIENT_SA > config/buffer-client-sa.json

          TESTRUNNER_SA_B64=${{ secrets[steps.setup-env-var-names.outputs.TESTRUNNER_SA_VAR] }}
          echo ::add-mask::$TESTRUNNER_SA_B64
          TESTRUNNER_SA=$(echo $TESTRUNNER_SA_B64 | base64 --decode)
          echo ::add-mask::$TESTRUNNER_SA
          echo $TESTRUNNER_SA | jq .type
          echo $TESTRUNNER_SA > config/testrunner-sa.json

          TESTRUNNER_K8S_SA_B64=${{ secrets[steps.setup-env-var-names.outputs.TESTRUNNER_K8S_SA_VAR] }}
          echo ::add-mask::$TESTRUNNER_K8S_SA_B64
          TESTRUNNER_K8S_SA=$(echo $TESTRUNNER_K8S_SA_B64 | base64 --decode)
          echo ::add-mask::$TESTRUNNER_K8S_SA
          echo $TESTRUNNER_K8S_SA | jq -r ".data[\"ca.crt\"]" > config/testrunner-k8s-sa-key.txt
          echo $TESTRUNNER_K8S_SA | jq -r .data.token | base64 --decode > config/testrunner-k8s-sa-token.txt

          WSM_SA_B64=${{ secrets[steps.setup-env-var-names.outputs.WSM_SA_VAR] }}
          echo ::add-mask::$WSM_SA_B64
          WSM_SA=$(echo $WSM_SA_B64 | base64 --decode)
          echo ::add-mask::$WSM_SA
          echo $WSM_SA | jq .type
          echo $WSM_SA > config/wsm-sa.json
        shell: bash